---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devops-demo--wordpress

resources:
  - ../../components/wordpress-app/

secretGenerator:
  - name: mysql-secret
    type: Opaque
    envs:
      - mysql-secrets.env
    behavior: create
  - name: wordpress-secret
    type: Opaque
    envs:
      - wordpress-secrets.env
