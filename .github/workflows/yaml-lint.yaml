---
name: YAML Lint

on:
  push:
    branches:
      - "**"
    paths:
      - "**.yaml"
      - "**.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "**.yaml"
      - "**.yml"
  workflow_dispatch:

jobs:
  yaml-lint:
    name: Lint YAML Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: >
          yamllint -c .github/workflows/yamllint.yaml .
          || (echo "YAML lint failed" && exit 1)

      - name: Success message
        if: success()
        run: echo "All YAML files passed linting"
